name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # デプロイのトリガーとなるブランチ

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20" # プロジェクトに合わせて変更してください

      # 依存関係のインストールとビルド (distフォルダが生成される想定)
      - name: Install dependencies
        run: npm ci # または npm install

      - name: Build
        run: npm run build

      # distフォルダのみをGitHub Pagesにデプロイ
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # ここで公開ディレクトリを指定
